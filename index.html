st o=document.createElement('option');o.value=c;o.textContent=c;fCat.appendChild(o)});[...allIcps].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;fIcp.appendChild(o)});function normCost(c){if(c.includes('Free'))return'free';if(c.includes('High')&&!c.includes('Low')&&!c.includes('Medium'))return'high';if(c.includes('Medium'))return'medium';return'low'}function normEffort(e){if(e.includes('High')&&!e.includes('Low')&&!e.includes('Medium'))return'high';if(e.includes('Medium'))return'medium';return'low'}function render(){const fc=fCat.value,fe=fEff.value,fco=fCost.value,fi=fIcp.value,s=search.value.toLowerCase();const filtered=D.filter(d=>{if(fc&&d.cat!==fc)return false;if(fe&&!d.effort.includes(fe))return false;if(fco){const nc=normCost(d.cost);const nfc=fco.toLowerCase();if(nfc==='free'&&nc!=='free')return false;if(nfc==='low'&&nc!=='low'&&nc!=='free')return false;if(nfc==='medium'&&nc!=='medium')return false;if(nfc==='high'&&nc!=='high')return false}if(fi&&!d.icp.some(i=>i.includes(fi)))return false;if(s&&!(d.name.toLowerCase().includes(s)||d.desc.toLowerCase().includes(s)||d.tools.toLowerCase().includes(s)||d.cat.toLowerCase().includes(s)))return false;return true});stats.innerHTML='<div class="stat"><div class="num">'+filtered.length+'</div><div class="lbl">Tactics Shown</div></div><div class="stat"><div class="num">'+new Set(filtered.map(d=>d.cat)).size+'</div><div class="lbl">Categories</div></div><div class="stat"><div class="num">'+filtered.filter(d=>normEffort(d.effort)==='low').length+'</div><div class="lbl">Low Effort</div></div><div class="stat"><div class="num">'+filtered.filter(d=>normCost(d.cost)==='free'||normCost(d.cost)==='low').length+'</div><div class="lbl">Free/Low Cost</div></div>';grid.innerHTML='';noRes.style.display=filtered.length?'none':'block';filtered.forEach(d=>{const ne=normEffort(d.effort),nc=normCost(d.cost);const hasDetail=DETAIL_PAGES[d.id];const card=document.createElement('div');card.className=
