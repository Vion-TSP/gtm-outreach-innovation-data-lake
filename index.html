tantly, Autobound, CommonRoom, UserGems',effort:'Medium',cost:'Medium',icp:['All ICPs','VP+']},{id:'1.3',cat:'Cold Outbound',name:'Micro-Segmented Outreach (<50)',desc:'Tiny lists of <50 sharing hyper-specific characteristics. 5.8% response vs 2.1% for larger lists.',tools:'Clay, Instantly',effort:'Medium',cost:'Low',icp:['All ICPs']},{id:'1.4',cat:'Cold Outbound',name:'Voice Note Cold Outreach',desc:'30-60s voice notes via LinkedIn/email. Human voice builds trust. 3x response rates vs text InMails.',tools:'LinkedIn (native), Otter.ai, Lavender',effort:'Medium',cost:'Free-Low',icp:['Founders','Sales Leaders']},{id:'1.5',cat:'Cold Outbound',name:'Plain Text Colleague-Style Emails',desc:'Strip HTML/logos. Write like an internal colleague. Bypasses Promotions filters. Under 5 sentences.',tools:'Instantly',effort:'Low',cost:'Free',icp:['All ICPs','Technical Buyers']},{id:'1.6',cat:'Cold Outbound',name:'Multi-Channel Orchestrated Sequences',desc:'Pair cold email with LinkedIn nurturing. Email + LinkedIn = 11.87% reply rates, highest combo.',tools:'Instantly + LinkedIn + HubSpot, La Growth Machine',effort:'Medium',cost:'Low-Medium',icp:['All ICPs']},{id:'1.7',cat:'Cold Outbound',name:'Trigger Library Approach',desc:'Pre-written insight blocks tied to signals. Assemble email from blocks + personalised opener. Speed + quality.',tools:'Clay, Notion, Instantly',effort:'High',cost:'Low',icp:['All ICPs']},{id:'2.1',cat:'LinkedIn-Native',name:'LinkedIn Live AMA Sessions',desc:'Host AMAs on ICP topics. 7x more reactions than video. 29.6% engagement rates.',tools:'LinkedIn Live + StreamYard/Restream',effort:'Medium',cost:'Free-Low',icp:['Founders','Technical Buyers','Sales Leaders']},{id:'2.2',cat:'LinkedIn-Native',name:'LinkedIn Newsletter as Lead Magnet',desc:'Newsletter on niche ICP topic. Push notifications. 40-50% open rates. 1,000+ subs in 6-12mo.',tools:'LinkedIn (native), Canva',effort:'Medium',cost:'Free',icp:['All ICPs']},{id:'2.3',cat:'LinkedIn-Native',name:'Employee Ad e technologies. Indicates evaluation + change readiness.',tools:'Clay, BuiltWith, Wappalyzer',effort:'Low-Medium',cost:'Medium',icp:['Technical Buyers','Ops Leaders']},{id:'6.4',cat:'Signal-Based / Intent',name:'G2/Review Site Intent Signals',desc:'G2 provides intent data on companies researching your category. In-market = high intent.',tools:'G2 Buyer Intent, TrustRadius, Capterra',effort:'Low',cost:'Medium-High',icp:['Technical Buyers','Ops Leaders']},{id:'6.5',cat:'Signal-Based / Intent',name:'Website Visitor Identification',desc:'Identify companies visiting your website/pricing page. Trigger outreach in real-time.',tools:'Dealfront (GDPR), RB2B, Clearbit, Warmly',effort:'Low-Medium',cost:'Medium',icp:['All ICPs']},{id:'6.6',cat:'Signal-Based / Intent',name:'Competitor Churn Signal Monitoring',desc:'Track negative reviews, complaints, job postings replacing tool admin. Perfect timing.',tools:'G2, Twitter/X, Reddit, Klue',effort:'Medium',cost:'Low-Medium',icp:['All ICPs']},{id:'6.7',cat:'Signal-Based / Intent',name:'Leadership Change Alerts',desc:'New senior leaders change tech stack within 90 days. 3x more likely to buy.',tools:'UserGems, LinkedIn Sales Nav, Clay',effort:'Low',cost:'Medium',icp:['C-suite','VP-level']},{id:'7.1',cat:'ABM Plays',name:'Personalised Landing Pages',desc:'Custom pages with target logo, industry content, tailored props. 60% higher win rates.',tools:'Mutiny, Intellimize, Webflow',effort:'Medium-High',cost:'Medium',icp:['C-suite','VP-level']},{id:'7.2',cat:'ABM Plays',name:'Custom Video for Target Accounts',desc:'60-90s custom video: research their business, analyse GTM, show specific proposal.',tools:'Loom, Vidyard, HeyGen',effort:'High',cost:'Low',icp:['C-suite','Founders']},{id:'7.3',cat:'ABM Plays',name:'Multi-Threading (Buying Group)',desc:'Map full committee (avg 11 stakeholders). Parallel role-specific outreach.',tools:'LinkedIn Sales Nav, HubSpot, Clay',effort:'High',cost:'Medium',icp:['Enterprise accounts']},{id:'7.4',cat:'ABM Plays',name:'Account-Specific Content Hubs',desc:'Private microsite for target account: case studies, ROI, proposals. Track engagement.',tools:'Folloze, Uberflip, PathFactory, Notion',effort:'High',cost:'Medium-High',icp:['Enterprise C-suite']},{id:'7.5',cat:'ABM Plays',name:'Account-Based Advertising',desc:'LinkedIn + display ads targeted at employees of specific accounts. Role-specific creative.',tools:'LinkedIn Campaign Manager, RollWorks',effort:'Medium',cost:'Medium-High',icp:['All buying committee']},{id:'7.6',cat:'ABM Plays',name:'Champion Building Programme',desc:'Arm internal champions with content, ROI data, presentations to sell internally.',tools:'HubSpot, Notion, LinkedIn',effort:'Medium',cost:'Low',icp:['Mid-level','RevOps','Marketing Managers']},{id:'8.1',cat:'Partnerships & Ecosystem',name:'Technology Partner Co-Selling',desc:'Partner with complementary vendors. Share leads, co-create content, refer customers.',tools:'Reveal/Crossbeam, PartnerStack',effort:'Medium-High',cost:'Low-Medium',icp:['All ICPs']},{id:'8.2',cat:'Partnerships & Ecosystem',name:'Agency Referral Programme',desc:'Structured referral programme with agencies. Agencies = trusted advisors to your ICP.',tools:'PartnerStack, FirstPromoter, HubSpot',effort:'Medium',cost:'Low + commissions',icp:['Founders','C-suite']},{id:'8.3',cat:'Partnerships & Ecosystem',name:'Marketplace / Integration Listing',desc:'List on partner marketplaces (HubSpot, Salesforce). High purchase intent from browsers.',tools:'Marketplace portals',effort:'Medium',cost:'Low',icp:['Technical Buyers','Ops Leaders']},{id:'8.4',cat:'Partnerships & Ecosystem',name:'Co-Hosted Webinar Series',desc:'Joint webinar with complementary vendor. Both promote. Double reach, split costs.',tools:'Zoom Webinar, Goldcast, HubSpot',effort:'Medium',cost:'Low-Medium',icp:['All ICPs']},{id:'8.5',cat:'Partnerships & Ecosystem',name:'Investor Network Warm Intros',desc:'Leverage shared investors/board/advisors for intros to their portfolio companies.',tools:'LinkedIn, Crunchbase, The Swarm',effort:'Low-Medium',cost:'Free',icp:['Founders','C-suite']},{id:'9.1',cat:'Creative / Guerrilla',name:'Handwritten Notes at Scale',desc:'Robotic-pen notes. Only 4% find annoying. 15-25% close rate lift vs email-only.',tools:'Scribeless (integrates Clay), Handwrytten',effort:'Low',cost:'Low-Medium',icp:['C-suite','Founders']},{id:'9.2',cat:'Creative / Guerrilla',name:'Creative Direct Mail Packages',desc:'Physical package (notebook, charger, coffee + note). Bypasses digital filters. 3x meetings.',tools:'Sendoso, Reachdesk, Postal',effort:'Medium',cost:'Medium-High',icp:['C-suite','VP-level']},{id:'9.3',cat:'Creative / Guerrilla',name:'We Built This For You Demo',desc:'Pre-configure product with prospect data/logo. They see their company already in the product.',tools:'Your product + Loom',effort:'High',cost:'Low',icp:['C-suite','Founders']},{id:'9.4',cat:'Creative / Guerrilla',name:'Free Personalised Video Audit',desc:'5-10min Loom auditing prospect website/sales/marketing. Even non-buyers refer others.',tools:'Loom (free)',effort:'Medium',cost:'Free',icp:['Founders','Sales Leaders']},{id:'9.5',cat:'Creative / Guerrilla',name:'Office Lunch Drop',desc:'Cater lunch to target office + note. Gets brand on their table. 10-50 person offices.',tools:'Deliveroo/Just Eat for Business',effort:'Low',cost:'Medium',icp:['Sales Leaders','Founders']},{id:'9.6',cat:'Creative / Guerrilla',name:'Personalised LinkedIn Ads (Loom ABM)',desc:'LinkedIn ads that feel account-specific. 2-3.5% CTR vs standard 0.4-0.5%.',tools:'LinkedIn Campaign Manager, Canva',effort:'Medium-High',cost:'Medium-High',icp:['All ICPs']},{id:'9.7',cat:'Creative / Guerrilla',name:'Breakup Email / Message',desc:'Final email after ignored sequence. Removes pressure. 60% of cold replies come after 2nd follow-up.',tools:'Instantly',effort:'Low',cost:'Free',icp:['All ICPs']},{id:'10.1',cat:'AI-Powered',name:'AI SDR Agents (Full Autopilot)',desc:'AI agents research, write, send, handle replies, book meetings 24/7.',tools:'11x.ai (Alice/Mike), Artisan AI (Ava), AiSDR',effort:'Medium',cost:'Medium-High',icp:['Mid-market ICPs']},{id:'10.2',cat:'AI-Powered',name:'AI-Generated Personalised Video',desc:'AI avatar addresses prospect by name. No recording needed. Hundreds from one script.',tools:'HeyGen, Synthesia, Tavus',effort:'Low',cost:'Medium',icp:['All ICPs']},{id:'10.3',cat:'AI-Powered',name:'AI Voice Agents (Outbound Calling)',desc:'AI makes calls, qualifies leads, books meetings. Sounds human. Hundreds simultaneously.',tools:'11x.ai (Mike), Bland.ai, Air AI, Orum',effort:'Medium',cost:'Medium-High',icp:['Founders','Sales Leaders']},{id:'10.4',cat:'AI-Powered',name:'Dynamic AI Landing Pages',desc:'Pages personalise content/CTAs based on visitor company, role, industry automatically.',tools:'Mutiny, Intellimize, Warmly',effort:'Medium',cost:'Medium',icp:['All ICPs']},{id:'10.5',cat:'AI-Powered',name:'Automated Research Agents',desc:'AI continuously researches accounts (news, LinkedIn, jobs). Surfaces insights for SDR use.',tools:'Clay, Relevance AI, Perplexity API',effort:'Medium',cost:'Low-Medium',icp:['All ICPs']},{id:'10.6',cat:'AI-Powered',name:'AI Conversational Chat (Inbound)',desc:'Replace static forms with AI qualifying visitors real-time. Book meetings instantly.',tools:'Drift/Salesloft, Intercom Fin, Qualified',effort:'Medium',cost:'Medium-High',icp:['All inbound ICPs']},{id:'10.7',cat:'AI-Powered',name:'Predictive Lead Scoring',desc:'AI/ML scores leads on hundreds of signals. Focus SDR time on highest-probability accounts.',tools:'6sense, Demandbase, MadKudu, HubSpot',effort:'Medium-High',cost:'Medium-High',icp:['All ICPs']},{id:'11.1',cat:'Warm Intro / Network',name:'Mutual Connection Mapping',desc:'Map team collective network vs target accounts. Warm intros = 5-10x cold conversion.',tools:'LinkedIn Sales Nav, The Swarm, Apollo.io',effort:'Medium',cost:'Low-Medium',icp:['All ICPs']},{id:'11.2',cat:'Warm Intro / Network',name:'Customer Referral Programme',desc:'Systematise asking happy customers for referrals. Ask after major wins or positive NPS.',tools:'ReferralCandy, Referral Rock, HubSpot',effort:'Low-Medium',cost:'Low + incentives',icp:['All ICPs']},{id:'11.3',cat:'Warm Intro / Network',name:'Alumni Network Targeting',desc:'Target prospects sharing alma maters or past employers. Instant rapport.',tools:'LinkedIn Sales Nav (alumni filter)',effort:'Low',cost:'Low',icp:['Founders','C-suite']},{id:'11.4',cat:'Warm Intro / Network',name:'Board / Advisory Network Leverage',desc:'Map advisors/board networks. Ask for specific intros with forwardable blurbs.',tools:'LinkedIn, Crunchbase',effort:'Low',cost:'Free',icp:['Founders','C-suite']},{id:'11.5',cat:'Warm Intro / Network',name:'Ecosystem-Led Growth (Partner Overlap)',desc:'Find accounts where you + partner both have relationships. Partner provides warm intro.',tools:'Reveal/Crossbeam (free tier)',effort:'Medium',cost:'Low',icp:['All ICPs']},{id:'12.1',cat:'Product-Led / Experience',name:'Interactive Product Demo (Self-Serve)',desc:"Clickable demo on website. 88% won't book call without seeing product. 1.7x signups.",tools:'Navattic, Storylane, HowdyGo',effort:'Medium',cost:'Medium',icp:['Technical Buyers','Ops Leaders']},{id:'12.2',cat:'Product-Led / Experience',name:'Free Tool / Micro-SaaS',desc:'Build free tool solving one ICP problem. Gateway to core product/service.',tools:'Vercel/Next.js, custom dev',effort:'High',cost:'Medium-High',icp:['Technical Buyers','Founders']},{id:'12.3',cat:'Product-Led / Experience',name:'Sandbox / Trial Environment',desc:'Pre-populated sandbox with realistic data. Zero friction. Track usage for PQLs.',tools:'Reprise, Walnut, engineering',effort:'High',cost:'Medium-High',icp:['Technical Buyers','Ops Leaders']},{id:'12.4',cat:'Product-Led / Experience',name:'Data-as-a-Service Lead Magnet',desc:'Free proprietary data/benchmarks. Demonstrates expertise. Creates ongoing engagement.',tools:'Custom platform, Airtable, Notion',effort:'High',cost:'Medium-High',icp:['C-suite','VP-level']},{id:'12.5',cat:'Product-Led / Experience',name:'Reverse Trial (Premium then Downgrade)',desc:'Full premium access 14-30 days, then downgrade. Users avoid loss = higher upgrade.',tools:'Stripe, Chargebee, engineering',effort:'Medium',cost:'Low',icp:['All product users']}];const cats=[...new Set(D.map(d=>d.cat))];const allIcps=new Set();D.forEach(d=>d.icp.forEach(i=>allIcps.add(i)));const fCat=document.getElementById('fCat'),fEff=document.getElementById('fEffort'),fCost=document.getElementById('fCost'),fIcp=document.getElementById('fIcp'),search=document.getElementById('search'),grid=document.getElementById('grid'),stats=document.getElementById('stats'),noRes=document.getElementById('noRes');cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;fCat.appendChild(o)});[...allIcps].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;fIcp.appendChild(o)});function normCost(c){if(c.includes('Free'))return'free';if(c.includes('High')&&!c.includes('Low')&&!c.includes('Medium'))return'high';if(c.includes('Medium'))return'medium';return'low'}function normEffort(e){if(e.includes('High')&&!e.includes('Low')&&!e.includes('Medium'))return'high';if(e.includes('Medium'))return'medium';return'low'}function render(){const fc=fCat.value,fe=fEff.value,fco=fCost.value,fi=fIcp.value,s=search.value.toLowerCase();const filtered=D.filter(d=>{if(fc&&d.cat!==fc)return false;if(fe&&!d.effort.includes(fe))return false;if(fco){const nc=normCost(d.cost);const nfc=fco.toLowerCase();if(nfc==='free'&&nc!=='free')return false;if(nfc==='low'&&nc!=='low'&&nc!=='free')return false;if(nfc==='medium'&&nc!=='medium')return false;if(nfc==='high'&&nc!=='high')return false}if(fi&&!d.icp.some(i=>i.includes(fi)))return false;if(s&&!(d.name.toLowerCase().includes(s)||d.desc.toLowerCase().includes(s)||d.tools.toLowerCase().includes(s)||d.cat.toLowerCase().includes(s)))return false;return true});stats.innerHTML='<div class="stat"><div class="num">'+filtered.length+'</div><div class="lbl">Tactics Shown</div></div><div class="stat"><div class="num">'+new Set(filtered.map(d=>d.cat)).size+'</div><div class="lbl">Categories</div></div><div class="stat"><div class="num">'+filtered.filter(d=>normEffort(d.effort)==='low').length+'</div><div class="lbl">Low Effort</div></div><div class="stat"><div class="num">'+filtered.filter(d=>normCost(d.cost)==='free'||normCost(d.cost)==='low').length+'</div><div class="lbl">Free/Low Cost</div></div>';grid.innerHTML='';noRes.style.display=filtered.length?'none':'block';filtered.forEach(d=>{const ne=normEffort(d.effort),nc=normCost(d.cost);const card=document.createElement('div');card.className='card';card.innerHTML='<div class="hdr"><span class="id">'+d.id+'</span><span class="cat">'+d.cat+'</span></div><h3>'+d.name+'</h3><div class="desc">'+d.desc+'</div><div class="meta"><span class="tag effort-'+ne+'">Effort: '+d.effort+'</span><span class="tag cost-'+nc+'">Cost: '+d.cost+'</span>'+d.icp.map(function(i){return'<span class="tag icp">'+i+'</span>'}).join('')+'</div><div class="tools"><b>Tools:</b> '+d.tools+'</div>';grid.appendChild(card)})}[fCat,fEff,fCost,fIcp,search].forEach(function(el){el.addEventListener('input',render)});render()</script></body></html>
